name: Auto Translate Documentation

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  translate:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      with:
        fetch-depth: 0

    - name: Checkout source (English)
      uses: actions/checkout@v3
      with:
        repository: home-assistant/home-assistant.io
        path: source-en
        token: ${{ secrets.PAT_TOKEN }}

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4 markdown python-frontmatter tqdm

    - name: Run translation
      run: |
        echo "当前工作目录: $(pwd)"
        ls -R scripts/
        python scripts/translate.py

    - name: Commit and push changes
      run: |
        cd source-cn
        git config --global user.name "GitHub Actions"
        git config --global user.email "actions@github.com"
        git add .
        git diff --quiet && git diff --staged --quiet || git commit -m "Auto-translate: $(date +'%Y-%m-%d %H:%M:%S')"
        git push