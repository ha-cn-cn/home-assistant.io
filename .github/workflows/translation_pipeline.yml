name: Translation Pipeline

on:
  schedule:
    - cron: '0 2 * * *'  # 每天UTC时间2点运行
  workflow_dispatch:
    inputs:
      strict_mode:
        description: 'Enable strict validation'
        required: false
        default: 'false'

env:
  MAX_RETRIES: 3
  TRANSLATION_THRESHOLD: 0.6  # 中英长度比阈值

jobs:
  translation:
    name: Translate Content
    runs-on: ubuntu-latest
    outputs:
      report_artifact: ${{ steps.upload_report.outputs.artifact_name }}
      has_errors: ${{ steps.validate.outputs.has_errors }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Setup Environment
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"
          cache: 'pip'

      - name: Install Dependencies
        run: |
          pip install -r scripts/requirements.txt

      - name: Run Translation
        id: translate
        run: |
          python scripts/translation/translator.py \
            --config configs/translation_config.yaml \
            --retries ${{ env.MAX_RETRIES }}
        env:
          LIBRETRANSLATE_URL: "https://libretranslate.de"

      - name: Validate Translations
        id: validate
        run: |
          python scripts/verification/completeness_checker.py \
            --threshold ${{ env.TRANSLATION_THRESHOLD }} \
            --strict ${{ github.event.inputs.strict_mode }}
          
          python scripts/verification/term_checker.py \
            --blacklist configs/term_blacklist.yaml

          python scripts/verification/structure_validator.py
        continue-on-error: true

      - name: Generate Report
        run: |
          python scripts/reporting/report_generator.py \
            --output-dir ./reports \
            --format html markdown

      - name: Upload Report
        id: upload_report
        uses: actions/upload-artifact@v3
        with:
          name: translation-report-${{ github.run_id }}
          path: |
            ./reports/*
            !./reports/tmp_*
          retention-days: 7

  notify:
    name: Notify Results
    needs: translation
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Download Report
        uses: actions/download-artifact@v3
        with:
          name: ${{ needs.translation.outputs.report_artifact }}

      - name: Send Slack Notification
        if: needs.translation.outputs.has_errors == 'true'
        run: |
          python scripts/reporting/slack_notifier.py \
            --status failed \
            --report ./translation-report-${{ github.run_id }}/report.md
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}

      - name: Success Notification
        if: needs.translation.outputs.has_errors == 'false'
        run: |
          python scripts/reporting/slack_notifier.py --status success