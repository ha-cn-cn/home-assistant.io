name: Integrated Translation Pipeline

on:
  schedule:
    - cron: '0 2 * * *'  # 每天UTC时间2点运行
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  translate-and-verify:
    runs-on: ubuntu-latest
    steps:
      # 第一阶段：设置环境
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install \
            requests \
            pyyaml \
            beautifulsoup4 \
            polib \
            mdcheck \
            termcolor

      # 第二阶段：翻译与验证
      - name: Run free translation
        id: translate
        run: python scripts/integrated_translator.py
        env:
          MAX_RETRIES: 3

      - name: Verify completeness
        if: steps.translate.outcome == 'success'
        run: python scripts/verify_completeness.py --strict

      - name: Check terms
        if: steps.translate.outcome == 'success'
        run: python scripts/verify_terms.py --ci

      - name: Validate structure
        if: steps.translate.outcome == 'success'
        run: python scripts/verify_structure.py --threshold 0.4

      # 第三阶段：报告生成
      - name: Generate report
        if: always()
        run: |
          python scripts/generate_report.py
          echo "REPORT_DATE=$(date +'%Y-%m-%d')" >> $GITHUB_ENV

      - name: Upload translation report
        uses: actions/upload-artifact@v3
        with:
          name: translation-report-${{ env.REPORT_DATE }}
          path: |
            report.html
            translation_issues.md
          retention-days: 7  # 自动保留7天

      # 第四阶段：创建PR
      - name: Create Pull Request
        if: steps.translate.outcome == 'success'
        uses: peter-evans/create-pull-request@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          title: "🌐 Integrated Translation Update (${{ env.REPORT_DATE }})"
          branch: "integrated-translation"
          commit-message: "🌐 Auto-translation with verification"
          labels: "translation,verified"
          body: |
            ### Combined Translation Report
            - **Translated Files**: ${{ steps.translate.outputs.file_count }}
            - **Verification Status**: ${{ job.status }}
            - [Download Full Report](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})