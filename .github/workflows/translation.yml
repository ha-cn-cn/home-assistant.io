name: Free Translation Pipeline

on:
  schedule:
    - cron: '0 2 * * *'  # 每天UTC时间2点运行（避开高峰）
  workflow_dispatch:

permissions:
  contents: write

jobs:
  translate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pyyaml beautifulsoup4

      - name: Run free translation
        run: python scripts/free_translator.py

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          title: "🌐 Free Translation Updates"
          branch: "free-translation"
          commit-message: "Auto translation using free services"
          labels: "translation"